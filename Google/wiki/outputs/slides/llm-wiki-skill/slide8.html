<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {

  display: flex; flex-direction: column; justify-content: center; align-items: center;

.content {
  text-align: center; padding: 30pt;
}

  color: #A78BFA; font-size: 28pt; margin: 0 0 25pt 0;

  width: 150pt; height: 2pt; background: #7C3AED; margin: 25pt auto;
}
.path {
  background: #1E293B; padding: 12pt 20pt; border-radius: 6pt; display: inline-block;

<body>
<div class="content">
  <h1>Get Started</h1>
  <div class="points">
    <p><b class="check">1.</b>  Create wiki: init_wiki.py or manually</p>
    <p><b class="check">2.</b>  Add sources to raw/</p>
    <p><b class="check">3.</b>  Say "ingest the sources"</p>
    <p><b class="check">4.</b>  Query, file answers, lint regularly</p>
  </div>
  <div class="divider"></div>
  <div class="path">
    <p>~/.claude/skills/llm-wiki/</p>
