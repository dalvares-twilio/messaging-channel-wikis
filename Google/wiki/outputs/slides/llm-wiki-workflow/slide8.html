<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #1E293B; font-family: Arial, sans-serif;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
}
.content {
  text-align: center; padding: 30pt;
}
h1 {
  color: #0D9488; font-size: 32pt; margin: 0 0 25pt 0;
}
.takeaways {
  text-align: left; margin: 0 auto; display: inline-block;
}
.takeaways p {
  color: #F8FAFC; font-size: 16pt; margin: 0 0 15pt 0; line-height: 1.4;
}
.number {
  color: #F59E0B; font-weight: bold;
}
.divider {
  width: 200pt; height: 2pt; background: #0D9488; margin: 25pt auto;
}
.footer {
  color: #64748B; font-size: 12pt; margin: 0;
}
</style>
</head>
<body>
<div class="content">
  <h1>Key Takeaways</h1>
  <div class="takeaways">
    <p><b class="number">1.</b> Raw sources are immutable. Wiki is LLM-maintained.</p>
    <p><b class="number">2.</b> Knowledge compiles once, not re-derived each query.</p>
    <p><b class="number">3.</b> Every interaction strengthens the wiki.</p>
    <p><b class="number">4.</b> File valuable Q&A to compound knowledge.</p>
    <p><b class="number">5.</b> Lint regularly to maintain health.</p>
  </div>
  <div class="divider"></div>
  <p class="footer">Pattern inspired by Andrej Karpathy</p>
</div>
</body>
</html>
